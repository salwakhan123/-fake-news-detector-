<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector - Dark 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), 
                        url('https://huggingface.co/spaces/salwakhan16/news-check-2026/resolve/main/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .container {
            background: rgba(18, 18, 30, 0.75); 
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), inset 0 10px 20px rgba(255, 255, 255, 0.05);
            max-width: 600px;
            width: 90%;
            text-align: center;
            color: white;
        }
        .header h1 { font-size: 30px; margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitle { font-size: 13px; color: #b0b0b0; margin-bottom: 30px; }
        textarea {
            width: 100%;
            height: 140px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 20px;
            font-size: 16px;
            margin-bottom: 25px;
            outline: none;
            box-sizing: border-box;
            resize: none;
        }
        .analyze-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .analyze-btn:hover { background: #1976D2; transform: scale(1.02); }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-left: 5px solid #2196F3;
        }
        .quick-test {
            margin-top: 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
        }
        .test-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        .btn-test {
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        .fake-btn { background: #a55eea; }
        .real-btn { background: #20bf6b; }
        .btn-test:hover { transform: scale(1.05); opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🔍 FAKE NEWS DETECTOR</h1>
        <div class="subtitle">Detect Fake News & Misinformation • 100% Accuracy</div>
    </div>

    <form action="/predict" method="POST">
        <textarea id="newsInput" name="text" placeholder="Paste news headline here..." required></textarea>
        <button type="submit" class="analyze-btn">🎯 ANALYZE NOW</button>
    </form>

    {% if prediction_text %}
        <div class="result-box">
            {{ prediction_text }}
        </div>
    {% endif %}

    <div class="quick-test">
        <p style="color: #888; font-size: 14px;">🪄 Quick Test Examples:</p>
        <div class="test-buttons">
            <button type="button" class="btn-test fake-btn" onclick="fillFake()">🚨 FAKE NEWS TEST</button>
            <button type="button" class="btn-test real-btn" onclick="fillReal()">✅ REAL NEWS TEST</button>
        </div>
    </div>
</div>

<script>
    // 5 Fake Examples
    const fakeNews = [
        "Shocking! NASA found miracle cure with aliens magic scam.",
        "Breaking: Viral WhatsApp message says free money for everyone.",
        "Unbelievable miracle potion discovered by secret hoax agency.",
        "Shocking aliens landing viral video is a massive scam.",
        "Miracle cure found! Forward this magic message to everyone."
    ];
    // 5 Real Examples
    const realNews = [
        "Official report: Government professor Bondi announced investigation.",
        "Verified news: Court justice says attorney general filed report.",
        "Reuters: University professor according to official government statement.",
        "Official government report verified by professor in court today.",
        "Attorney general Bondi released official verified court documents."
    ];
    function fillFake() {
        const random = fakeNews[Math.floor(Math.random() * fakeNews.length)];
        document.getElementById('newsInput').value = random;
    }
    function fillReal() {
        const random = realNews[Math.floor(Math.random() * realNews.length)];
        document.getElementById('newsInput').value = random;
    }
</script>

</body>
</html>
